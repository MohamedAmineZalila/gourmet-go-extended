name: Gourmet-Go CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  # -----------------------------------------------------------------
  # JOB 1 — Build & Package all Java services
  # -----------------------------------------------------------------
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - gourmet-order-service
          - gourmet-kitchen-service
          - gourmet-accounting-service
          - gourmet-orchestrator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }} (Maven)
        working-directory: ${{ matrix.service }}
        run: mvn clean package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # JOB 2 — Build Docker images and push to Docker Hub
  # ──────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Java 17 (needed for Maven inside Docker build)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build & Push each service image
      - name: Build & Push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./gourmet-order-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-order-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-order-service:${{ github.sha }}

      - name: Build & Push kitchen-service
        uses: docker/build-push-action@v5
        with:
          context: ./gourmet-kitchen-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-kitchen-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-kitchen-service:${{ github.sha }}

      - name: Build & Push accounting-service
        uses: docker/build-push-action@v5
        with:
          context: ./gourmet-accounting-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-accounting-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-accounting-service:${{ github.sha }}

      - name: Build & Push orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./gourmet-orchestrator
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-orchestrator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-orchestrator:${{ github.sha }}

      - name: Build & Push UI
        uses: docker/build-push-action@v5
        with:
          context: ./gourmet-ui
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-ui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gourmet-ui:${{ github.sha }}

      - name: Summary
        run: |
          echo "## ✅ Docker Images Pushed" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| gourmet-order-service | latest, ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| gourmet-kitchen-service | latest, ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| gourmet-accounting-service | latest, ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| gourmet-orchestrator | latest, ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| gourmet-ui | latest, ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
